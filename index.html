<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>🌍 World Builder</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;overflow:hidden;background:#1a2a3a;font-family:'Comic Sans MS','Chalkboard SE','Marker Felt',cursive;}
#app{display:flex;flex-direction:column;width:100%;height:100%;overflow:hidden;}
#tb{display:flex;align-items:center;gap:6px;padding:6px 10px;background:rgba(255,255,255,0.96);border-bottom:3px solid rgba(0,0,0,0.1);flex-shrink:0;}
#wn{font-family:inherit;font-size:clamp(11px,2.5vw,15px);font-weight:bold;border:2px solid #DDD;background:rgba(255,250,235,0.95);border-radius:10px;padding:4px 8px;color:#3A2A0A;flex:1;min-width:0;outline:none;}
#wn:focus{border-color:#FFB800;}
.tbtn{font-size:clamp(16px,4vw,22px);width:clamp(34px,7vw,46px);height:clamp(34px,7vw,46px);border-radius:50%;border:2.5px solid #DDD;background:#FFF;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform 0.12s;flex-shrink:0;-webkit-tap-highlight-color:transparent;}
.tbtn:active{transform:scale(0.86);}
.tbtn.pan{background:#B8E0FF;border-color:#4498CC;}
.tbtn.era{background:#FFB3B3;border-color:#CC3333;}
#sky-time{font-size:clamp(16px,4vw,22px);flex-shrink:0;}
#cw{flex:1;overflow:hidden;position:relative;min-height:0;}
#wbc,#cfc{display:block;position:absolute;top:0;left:0;touch-action:none;}
#cfc{pointer-events:none;}
#pk{background:rgba(255,255,255,0.97);border-top:3px solid rgba(0,0,0,0.09);padding:6px 10px 8px;flex-shrink:0;}
#ct{display:flex;gap:6px;margin-bottom:6px;}
.ctab{font-family:inherit;font-size:clamp(10px,2.2vw,13px);font-weight:bold;padding:4px 12px;border-radius:20px;border:2px solid #DDD;cursor:pointer;background:#F5F0E8;color:#888;transition:all 0.12s;-webkit-tap-highlight-color:transparent;white-space:nowrap;}
.ctab:active{transform:scale(0.94);}
.ctab.on{background:#FFD44A;border-color:#BB9900;color:#5A3A00;}
#ts{display:flex;gap:6px;overflow-x:auto;overflow-y:hidden;padding-bottom:4px;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
#ts::-webkit-scrollbar{display:none;}
.tp{flex-shrink:0;width:clamp(52px,12vw,68px);display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;padding:6px 4px 5px;border-radius:12px;border:3px solid transparent;background:#F5F0E8;transition:transform 0.12s;-webkit-tap-highlight-color:transparent;}
.tp:active{transform:scale(0.92);}
.tp.on{border-color:#FFB800;background:#FFF8E0;transform:translateY(-2px);}
.te{font-size:clamp(20px,5vw,28px);line-height:1.1;}
.tl{font-size:clamp(7px,1.6vw,10px);font-weight:bold;color:#666;text-align:center;white-space:nowrap;}
</style>
</head>
<body>
<div id="app">
  <div id="tb">
    <input id="wn" value="🌍 My World" maxlength="22"/>
    <span id="sky-time">☀️</span>
    <button class="tbtn" id="pb" title="Pan">✋</button>
    <button class="tbtn" id="erb" title="Erase">🧹</button>
    <button class="tbtn" id="clrb" title="Clear">🗑️</button>
    <button class="tbtn" id="savb" title="Save">📷</button>
  </div>
  <div id="cw">
    <canvas id="wbc"></canvas>
    <canvas id="cfc"></canvas>
  </div>
  <div id="pk">
    <div id="ct"></div>
    <div id="ts"></div>
  </div>
</div>
<script>
(function(){
const COLS=16,ROWS=16;
let TW=128,TH=76,TD=36;
const CATS=[{id:'nature',lbl:'🌿 Nature'},{id:'build',lbl:'🏠 Build'},{id:'magic',lbl:'✨ Magic'}];
const TYPES=[
  {id:'grass',n:'Grass',cat:'nature',c:['#3ED4BE','#1BA892','#27BBAA'],em:'🌿'},
  {id:'forest',n:'Forest',cat:'nature',c:['#38B870','#108C42','#24A058'],em:'🌲'},
  {id:'water',n:'Water',cat:'nature',c:['#56B8E0','#1A7EB0','#2E9ECC'],em:'🌊'},
  {id:'beach',n:'Beach',cat:'nature',c:['#EDD880','#B89830','#D4B448'],em:'🏖️'},
  {id:'mtn',n:'Mountain',cat:'nature',c:['#A8B4BE','#586470','#7C8C98'],em:'⛰️'},
  {id:'snow',n:'Snow',cat:'nature',c:['#D5E8F4','#88A8C2','#AECADC'],em:'❄️'},
  {id:'desert',n:'Desert',cat:'nature',c:['#DECA80','#9E8028','#BEAA50'],em:'🏜️'},
  {id:'road',n:'Road',cat:'build',c:['#B8C4CC','#708090','#90A0AC'],em:'🛣️'},
  {id:'house',n:'House',cat:'build',c:['#3ED4BE','#1BA892','#27BBAA'],em:'🏠'},
  {id:'farm',n:'Farm',cat:'build',c:['#9CCE58','#429008','#6BAA28'],em:'🌾'},
  {id:'castle',n:'Castle',cat:'build',c:['#B8A8D8','#7868B8','#9888C8'],em:'🏰'},
  {id:'volcano',n:'Volcano',cat:'magic',c:['#C44C3C','#841C0C','#A43424'],em:'🌋'},
  {id:'rainbow',n:'Rainbow',cat:'magic',c:['#88CCFF','#4488CC','#66AAEE'],em:'🌈'},
  {id:'mushroom',n:'Shroom',cat:'magic',c:['#D85858','#983030','#BC4848'],em:'🍄'},
  {id:'candy',n:'Candy',cat:'magic',c:['#FF88CC','#CC4488','#EE66AA'],em:'🍬'},
];
const G=Array.from({length:ROWS},()=>Array(COLS).fill(null));
let sel='grass',erasing=false,panMode=false,painting=false,panning=false;
let camX=0,camY=0,panSX=0,panSY=0,camSX=0,camSY=0,hov=null;
let canW=800,canH=400,ready=false,firstPlace=true,curCat='nature',lastT=0;
const conf=[],cars=[];
const CARCOLS=['#E83030','#3090E8','#E8C030','#30C860','#E830E8','#FF8C00'];
const CCOLS=['#FF4444','#44AAFF','#FFD700','#44DD44','#FF88CC','#FF8844','#AA44FF'];
const STARS=Array.from({length:60},()=>({x:Math.random(),y:Math.random()*0.8,s:Math.random()*1.8+0.4,twink:Math.random()*10}));
const cwEl=document.getElementById('cw');
const cv=document.getElementById('wbc');
const ctx=cv.getContext('2d');
const cfc=document.getElementById('cfc');
const cfx=cfc.getContext('2d');
const dpr=Math.min(window.devicePixelRatio||1,2);

function scaleTiles(w,h){
  const gridW=(COLS+ROWS)*0.5,gridH=(COLS+ROWS)*0.5;
  const scaleW=(w-60)/gridW,scaleH=(h-60-TD)/gridH;
  const scale=Math.min(scaleW,scaleH,1.0);
  TW=Math.max(40,Math.round(128*scale));
  TH=Math.max(24,Math.round(76*scale));
  TD=Math.max(12,Math.round(36*scale));
}
function resetCam(){
  camX=canW/2-((COLS-1)/2-(ROWS-1)/2)*TW/2;
  camY=canH/2-((COLS-1)/2+(ROWS-1)/2)*TH/2-20;
}
function initSize(){
  const w=cwEl.offsetWidth,h=cwEl.offsetHeight;
  if(!w||!h)return false;
  canW=w;canH=h;
  scaleTiles(w,h);
  [cv,cfc].forEach(c=>{c.width=Math.round(w*dpr);c.height=Math.round(h*dpr);c.style.width=w+'px';c.style.height=h+'px';});
  ctx.setTransform(dpr,0,0,dpr,0,0);
  cfx.setTransform(dpr,0,0,dpr,0,0);
  resetCam();ready=true;
  return true;
}
window.addEventListener('load',()=>{setTimeout(()=>{if(!initSize())setTimeout(initSize,150);},40);});
window.addEventListener('resize',initSize);
try{new ResizeObserver(initSize).observe(cwEl);}catch(e){}

function tScr(c,r){return{x:camX+(c-r)*TW/2,y:camY+(c+r)*TH/2};}
function iso(sx,sy,u,v){return{x:sx+TW/2+u*TW/2-v*TW/2,y:sy+u*TH/2+v*TH/2};}
function sToG(mx,my){
  const a=(mx-camX)*2/TW,b=(my-camY)*2/TH;
  const col=Math.round((a+b)/2),row=Math.round((b-a)/2);
  if(col>=0&&col<COLS&&row>=0&&row<ROWS)return{col,row};return null;
}
function ltn(h,a){const n=parseInt(h.slice(1),16);return`rgb(${Math.min(255,Math.max(0,(n>>16&255)+a))},${Math.min(255,Math.max(0,(n>>8&255)+a))},${Math.min(255,Math.max(0,(n&255)+a))})`;}
function lhex(a,b,t){const na=parseInt(a.slice(1),16),nb=parseInt(b.slice(1),16);return`rgb(${Math.round((na>>16&255)*(1-t)+(nb>>16&255)*t)},${Math.round((na>>8&255)*(1-t)+(nb>>8&255)*t)},${Math.round((na&255)*(1-t)+(nb&255)*t)})`;}
function S(v){return v*(TW/128);}

const SKY_KF=[[0,'#0A1840'],[0.15,'#FF8C40'],[0.28,'#FFD080'],[0.4,'#5ABCEF'],[0.62,'#FFA040'],[0.72,'#9040A0'],[0.8,'#0A1840'],[1,'#0A1840']];
function skyColor(p){for(let i=0;i<SKY_KF.length-1;i++){if(p>=SKY_KF[i][0]&&p<=SKY_KF[i+1][0]){const t=(p-SKY_KF[i][0])/(SKY_KF[i+1][0]-SKY_KF[i][0]);return lhex(SKY_KF[i][1],SKY_KF[i+1][1],t);}}return SKY_KF[0][1];}
function nightAmt(p){if(p>=0.82)return Math.min(1,(p-0.82)/0.08);if(p<=0.12)return Math.min(1,(0.12-p)/0.08);if(p>=0.68&&p<=0.82)return(p-0.68)/0.14;return 0;}
const SKY_ICONS=['🌙','🌅','☀️','☀️','🌇','🌆','🌙'];
function skyIcon(p){return SKY_ICONS[Math.min(Math.floor(p*6),6)];}

function drawBase(sx,sy,col){
  const[top,lft,rgt]=col;
  ctx.beginPath();ctx.moveTo(sx+TW/2,sy);ctx.lineTo(sx+TW,sy+TH/2);ctx.lineTo(sx+TW/2,sy+TH);ctx.lineTo(sx,sy+TH/2);ctx.closePath();ctx.fillStyle=top;ctx.fill();
  ctx.beginPath();ctx.moveTo(sx,sy+TH/2);ctx.lineTo(sx+TW/2,sy+TH);ctx.lineTo(sx+TW/2,sy+TH+TD);ctx.lineTo(sx,sy+TH/2+TD);ctx.closePath();ctx.fillStyle=lft;ctx.fill();
  ctx.beginPath();ctx.moveTo(sx+TW/2,sy+TH);ctx.lineTo(sx+TW,sy+TH/2);ctx.lineTo(sx+TW,sy+TH/2+TD);ctx.lineTo(sx+TW/2,sy+TH+TD);ctx.closePath();ctx.fillStyle=rgt;ctx.fill();
  ctx.strokeStyle='rgba(0,0,0,0.11)';ctx.lineWidth=0.7;
  ctx.beginPath();ctx.moveTo(sx+TW/2,sy);ctx.lineTo(sx+TW,sy+TH/2);ctx.lineTo(sx+TW/2,sy+TH);ctx.lineTo(sx,sy+TH/2);ctx.closePath();ctx.stroke();
  ctx.beginPath();ctx.moveTo(sx,sy+TH/2+TD);ctx.lineTo(sx+TW/2,sy+TH+TD);ctx.lineTo(sx+TW,sy+TH/2+TD);ctx.stroke();
  ctx.beginPath();ctx.moveTo(sx,sy+TH/2);ctx.lineTo(sx,sy+TH/2+TD);ctx.moveTo(sx+TW/2,sy+TH);ctx.lineTo(sx+TW/2,sy+TH+TD);ctx.moveTo(sx+TW,sy+TH/2);ctx.lineTo(sx+TW,sy+TH/2+TD);ctx.stroke();
}
function drawEmpty(sx,sy){
  ctx.beginPath();ctx.moveTo(sx+TW/2,sy);ctx.lineTo(sx+TW,sy+TH/2);ctx.lineTo(sx+TW/2,sy+TH);ctx.lineTo(sx,sy+TH/2);ctx.closePath();
  ctx.fillStyle='rgba(60,90,50,0.06)';ctx.fill();ctx.strokeStyle='rgba(0,0,0,0.038)';ctx.lineWidth=0.5;ctx.stroke();
}
function tree(cx,cy,s,lc,tc,sw){
  ctx.save();ctx.translate(cx,cy);ctx.rotate(sw||0);
  ctx.fillStyle=tc||'#6B3A20';ctx.fillRect(S(-3.5)*s,S(-2)*s,S(7)*s,S(14)*s);
  const g=lc||'#1A8840';
  [[14,10,ltn(g,40)],[12,9,ltn(g,22)],[9,7,g],[7,5,ltn(g,-10)]].forEach(([rx,ry,col],i)=>{ctx.fillStyle=col;ctx.beginPath();ctx.ellipse(0,S(-6)*s-i*S(5.5)*s,S(rx)*s,S(ry)*s,0,0,Math.PI*2);ctx.fill();});
  ctx.restore();
}
function puffs(cx,cy,t,n,spd,spr,r,g,b){
  for(let i=0;i<n;i++){const ph=((t*spd+i/n)%1),al=Math.max(0,0.48-ph*0.58);ctx.fillStyle=`rgba(${r},${g},${b},${al.toFixed(2)})`;ctx.beginPath();ctx.arc(cx+Math.sin(ph*4+i*2)*spr,cy-ph*S(26),S(2)+ph*S(7),0,Math.PI*2);ctx.fill();}
}
function bird(cx,cy,t){
  const a=t*0.9,bx=cx+Math.cos(a)*S(14),by=cy+S(-22)+Math.sin(a)*S(5);
  ctx.strokeStyle='rgba(40,20,5,0.65)';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(bx-S(5),by);ctx.quadraticCurveTo(bx-S(2),by-S(4),bx,by);ctx.quadraticCurveTo(bx+S(2),by-S(4),bx+S(5),by);ctx.stroke();
}
function decoGrass(sx,sy,t){
  const cx=sx+TW/2,cy=sy+TH/2;
  [[cx-S(20),cy+S(4),1.2,0],[cx+S(16),cy-S(3),1.0,1],[cx-S(4),cy-S(10),0.9,2],[cx+S(4),cy+S(13),0.8,3]].forEach(([x,y,s,i])=>{ctx.fillStyle=i%2===0?'#18A890':'#25C8A8';ctx.beginPath();ctx.ellipse(x,y+Math.sin(t*1.2+i*1.7)*S(2),S(9)*s,S(5.5)*s,0,0,Math.PI*2);ctx.fill();});
  [[cx-S(10),cy+S(8),0],[cx+S(8),cy-S(8),1.2]].forEach(([fx,fy,off])=>{const bob=Math.sin((t+off)*1.8)*S(1.5);ctx.fillStyle='#FFD44A';ctx.beginPath();ctx.arc(fx,fy+bob,S(3.5),0,Math.PI*2);ctx.fill();ctx.fillStyle='#FFF';for(let p=0;p<5;p++){ctx.beginPath();ctx.arc(fx+Math.cos(p*1.257)*S(5),fy+bob+Math.sin(p*1.257)*S(4),S(2),0,Math.PI*2);ctx.fill();}});
}
function decoForest(sx,sy,t){
  const cx=sx+TW/2,cy=sy+TH/2;
  ctx.fillStyle='rgba(10,70,25,0.32)';ctx.beginPath();ctx.ellipse(cx,cy+S(14),S(30),S(9),0,0,Math.PI*2);ctx.fill();
  tree(cx-S(18),cy+S(4),1.15,null,null,Math.sin(t*0.8)*0.055);
  tree(cx+S(13),cy+S(6),0.95,null,null,Math.sin(t*1.1+1.3)*0.05);
  tree(cx-S(3),cy-S(4),1.3,null,null,Math.sin(t*0.65+2.5)*0.04);
  bird(cx,cy,t);
}
function decoWater(sx,sy,t){
  for(let i=0;i<4;i++){const ph=((t*0.4+i*0.25)%1),al=0.08+Math.sin(ph*Math.PI*2)*0.35;if(al<0.01)continue;const p1=iso(sx,sy,0.05+i*0.18,0.22+i*0.16),p2=iso(sx,sy,0.55+i*0.1,0.12+i*0.15);ctx.strokeStyle=`rgba(255,255,255,${al.toFixed(2)})`;ctx.lineWidth=S(2.5);ctx.beginPath();ctx.moveTo(p1.x,p1.y);ctx.quadraticCurveTo((p1.x+p2.x)/2,(p1.y+p2.y)/2-S(4),p2.x,p2.y);ctx.stroke();}
  [[0.22,0.32],[0.68,0.62]].forEach(([u,v])=>{const p=iso(sx,sy,u,v);ctx.fillStyle='#228844';ctx.beginPath();ctx.ellipse(p.x,p.y,S(8),S(5),0,0,Math.PI*2);ctx.fill();ctx.fillStyle='#FF6688';ctx.beginPath();ctx.arc(p.x,p.y-S(3),S(2.5),0,Math.PI*2);ctx.fill();});
  [0,0.5].forEach((off,fi)=>{const ph=((t*0.22+off)%1),fp=iso(sx,sy,ph,0.3+fi*0.35),flip=fi%2===1?-1:1;ctx.save();ctx.translate(fp.x,fp.y+Math.sin(t*4+fi)*S(2));ctx.scale(flip,1);ctx.fillStyle='rgba(255,200,80,0.85)';ctx.beginPath();ctx.ellipse(0,0,S(9),S(4.5),0,0,Math.PI*2);ctx.fill();ctx.fillStyle='rgba(255,160,40,0.65)';ctx.beginPath();ctx.moveTo(-S(9),0);ctx.lineTo(-S(15),-S(5));ctx.lineTo(-S(15),S(5));ctx.closePath();ctx.fill();ctx.fillStyle='rgba(0,0,0,0.5)';ctx.beginPath();ctx.arc(S(7),0,S(1.2),0,Math.PI*2);ctx.fill();ctx.restore();});
}
function decoBeach(sx,sy,t){
  const cx=sx+TW/2,cy=sy+TH/2;
  tree(cx-S(8),cy+S(8),0.9,'#44AA22','#8B5E24',Math.sin(t*0.6)*0.07);
  const ph=(t*0.45%1),al=0.2+Math.sin(ph*Math.PI*2)*0.3;
  const p1=iso(sx,sy,0.82,0.08),p2=iso(sx,sy,0.95,0.88);
  ctx.strokeStyle=`rgba(80,185,225,${al.toFixed(2)})`;ctx.lineWidth=S(3);ctx.beginPath();ctx.moveTo(p1.x,p1.y);ctx.lineTo(p2.x,p2.y);ctx.stroke();
  [[cx+S(10),cy+S(5),S(3),S(8)],[cx+S(16),cy-S(2),S(2.5),S(6)]].forEach(([sx2,sy2,r1,r2])=>{ctx.fillStyle='#F4C0A0';ctx.beginPath();ctx.ellipse(sx2,sy2,r2,r1,0.3,0,Math.PI*2);ctx.fill();});
}
function decoMtn(sx,sy){
  const cx=sx+TW/2,cy=sy+TH/2-S(4);
  ctx.fillStyle='rgba(50,65,80,0.18)';ctx.beginPath();ctx.ellipse(cx+S(4),cy+S(10),S(26),S(10),0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#6A7C8E';ctx.beginPath();ctx.moveTo(cx,cy-S(34));ctx.lineTo(cx+S(30),cy+S(10));ctx.lineTo(cx-S(30),cy+S(10));ctx.closePath();ctx.fill();
  ctx.fillStyle='#8498A8';ctx.beginPath();ctx.moveTo(cx-S(12),cy-S(6));ctx.lineTo(cx+S(12),cy-S(6));ctx.lineTo(cx+S(30),cy+S(10));ctx.lineTo(cx-S(30),cy+S(10));ctx.closePath();ctx.fill();
  ctx.fillStyle='#EEF4FA';ctx.beginPath();ctx.moveTo(cx,cy-S(34));ctx.lineTo(cx+S(10),cy-S(16));ctx.lineTo(cx-S(10),cy-S(16));ctx.closePath();ctx.fill();
}
function decoSnow(sx,sy,t){
  const cx=sx+TW/2,cy=sy+TH/2;
  tree(cx-S(2),cy+S(2),1.1,'#88B0C8','#5A7080',Math.sin(t*0.5)*0.03);
  ctx.fillStyle='rgba(255,255,255,0.55)';ctx.beginPath();ctx.ellipse(cx-S(18),cy+S(12),S(16),S(5),0,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.ellipse(cx+S(16),cy+S(8),S(12),S(4),0,0,Math.PI*2);ctx.fill();
  for(let i=0;i<9;i++){const ph=((t*0.2+i*0.111)%1),p=iso(sx,sy,(i*0.137+0.05)%0.9,ph*0.85+0.05);ctx.fillStyle=`rgba(255,255,255,${(0.4+Math.sin(ph*Math.PI)*0.55).toFixed(2)})`;ctx.beginPath();ctx.arc(p.x,p.y,S(1.8),0,Math.PI*2);ctx.fill();}
}
function decoDesert(sx,sy,t){
  const cx=sx+TW/2,cy=sy+TH/2;
  for(let i=0;i<3;i++){const ph=((t*0.3+i*0.33)%1),al=0.1+Math.sin(ph*Math.PI*2)*0.22;if(al<0.01)continue;const p1=iso(sx,sy,0.08+i*0.22,0.18+i*0.12),p2=iso(sx,sy,0.08+i*0.22+0.5,0.18+i*0.12-0.05);ctx.strokeStyle=`rgba(210,160,30,${al.toFixed(2)})`;ctx.lineWidth=S(1.8);ctx.beginPath();ctx.moveTo(p1.x,p1.y);ctx.quadraticCurveTo((p1.x+p2.x)/2,(p1.y+p2.y)/2-S(5),p2.x,p2.y);ctx.stroke();}
  const cc=iso(sx,sy,0.65,0.32);ctx.fillStyle='#2A8020';ctx.fillRect(cc.x-S(4),cc.y-S(28),S(8),S(28));ctx.fillRect(cc.x-S(15),cc.y-S(16),S(12),S(5));ctx.fillRect(cc.x-S(15),cc.y-S(22),S(5),S(8));ctx.fillRect(cc.x+S(3),cc.y-S(12),S(12),S(5));ctx.fillRect(cc.x+S(9),cc.y-S(18),S(5),S(8));
}
function decoRoad(sx,sy){
  [[iso(sx,sy,0,0.5),iso(sx,sy,1,0.5),S(16)],[iso(sx,sy,0.5,0),iso(sx,sy,0.5,1),S(14)]].forEach(([p1,p2,lw])=>{ctx.strokeStyle='rgba(38,48,60,0.55)';ctx.lineWidth=lw;ctx.lineCap='square';ctx.beginPath();ctx.moveTo(p1.x,p1.y);ctx.lineTo(p2.x,p2.y);ctx.stroke();ctx.strokeStyle='rgba(255,255,255,0.42)';ctx.lineWidth=Math.max(1,S(2));ctx.setLineDash([S(7),S(7)]);ctx.beginPath();ctx.moveTo(p1.x,p1.y);ctx.lineTo(p2.x,p2.y);ctx.stroke();ctx.setLineDash([]);ctx.lineCap='butt';});

function decoVolcano(sx,sy,t){

  for(let i=0;i<7;i++){const ph=((t*1.1+i*0.143)%1),ex=cx+Math.sin(ph*6+i*1.8)*S(14)*ph,ey=cy-S(34)-ph*S(30),al=Math.max(0,0.9-ph*1.1);ctx.fillStyle=`rgba(255,${Math.round(140*ph)},0,${al.toFixed(2)})`;ctx.beginPath();ctx.arc(ex,ey,Math.max(0.5,S(2.5)-ph*S(1.5)),0,Math.PI*2);ctx.fill();}
  puffs(cx,cy-S(36),t,8,0.3,S(5),55,40,35);

function decoRainbow(sx,sy,t){
  const cx=sx+TW/2,cy=sy+TH/2+S(10),pulse=0.82+Math.sin(t*1.8)*0.18;
  ['#FF3333','#FF8800','#FFD700','#33CC33','#3388FF','#8833FF'].forEach((c,i)=>{ctx.strokeStyle=c;ctx.lineWidth=S(4);ctx.globalAlpha=pulse;ctx.beginPath();ctx.arc(cx,cy,S(34-i*4.5),Math.PI,0);ctx.stroke();});
  ctx.globalAlpha=1;
  [[cx-S(25),cy+S(1)],[cx+S(25),cy+S(1)]].forEach(([clx,cly])=>{ctx.fillStyle='rgba(255,255,255,0.88)';ctx.beginPath();ctx.ellipse(clx,cly,S(12),S(7),0,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.ellipse(clx-S(8),cly+S(3),S(8),S(5),0,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.ellipse(clx+S(8),cly+S(3),S(8),S(5),0,0,Math.PI*2);ctx.fill();});

function decoMushroom(sx,sy,t){
  const cx=sx+TW/2,cy=sy+TH/2,bob=Math.sin(t*1.5)*S(2.5);
  ctx.fillStyle='#F0E8D0';ctx.fillRect(cx-S(6),cy-S(8)+bob,S(12),S(14));

function decoCandy(sx,sy,t){
  const cx=sx+TW/2,cy=sy+TH/2,sw=Math.sin(t*1.2)*S(3);
  ctx.save();ctx.translate(cx-S(8),cy+S(10)+sw*0.4);ctx.rotate(sw*0.025);ctx.lineWidth=S(5.5);
  ['#FF2288','#FFF','#FF2288','#FFF'].forEach((c,i)=>{ctx.strokeStyle=c;ctx.setLineDash([S(4),S(4)]);ctx.lineDashOffset=-i*S(2)-t*S(9);ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(0,-S(26));ctx.quadraticCurveTo(0,-S(36),S(9),-S(36));ctx.stroke();});
  ctx.setLineDash([]);ctx.restore();
  ctx.save();ctx.translate(cx+S(10),cy+S(6));ctx.rotate(-sw*0.02);
  ctx.strokeStyle='#FF8800';ctx.lineWidth=S(4);ctx.beginPath();ctx.moveTo(0,-S(9));ctx.lineTo(0,S(7));ctx.stroke();
  const swirl=t*2.2;['#FF4488','#FF8800','#FFD700','#44CCFF','#88FF44'].forEach((c,i)=>{const a=i/5*Math.PI*2+swirl,r=S(5)-i*S(0.4);ctx.fillStyle=c;ctx.beginPath();ctx.arc(Math.cos(a)*r,Math.sin(a)*r-S(13),S(3),0,Math.PI*2);ctx.fill();});
  ctx.restore();
}
function deco(sx,sy,type,t,night){
  if(type==='grass')decoGrass(sx,sy,t);else if(type==='forest')decoForest(sx,sy,t);
  else if(type==='water')decoWater(sx,sy,t);else if(type==='beach')decoBeach(sx,sy,t);
  else if(type==='mtn')decoMtn(sx,sy);else if(type==='snow')decoSnow(sx,sy,t);
  else if(type==='desert')decoDesert(sx,sy,t);else if(type==='road')decoRoad(sx,sy);
  else if(type==='house')decoHouse(sx,sy,t,night);else if(type==='farm')decoFarm(sx,sy,t);
  else if(type==='castle')decoCastle(sx,sy,t);else if(type==='volcano')decoVolcano(sx,sy,t);
  else if(type==='rainbow')decoRainbow(sx,sy,t);else if(type==='mushroom')decoMushroom(sx,sy,t);
  else if(type==='candy')decoCandy(sx,sy,t);
}
function roadAt(r,c){return r>=0&&r<ROWS&&c>=0&&c<COLS&&G[r][c]==='road';}
function roadNbrs(r,c){return[[r-1,c],[r+1,c],[r,c-1],[r,c+1]].filter(([nr,nc])=>roadAt(nr,nc));}
function spawnCar(){
  const roads=[];for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++)if(G[r][c]==='road')roads.push([r,c]);
  if(roads.length<2)return;
  const[sr,sc]=roads[Math.floor(Math.random()*roads.length)];
  const nb=roadNbrs(sr,sc);if(!nb.length)return;
  const[nr,nc]=nb[Math.floor(Math.random()*nb.length)];
  cars.push({r:sr,c:sc,nr,nc,prog:0,spd:0.55+Math.random()*0.55,col:CARCOLS[Math.floor(Math.random()*CARCOLS.length)]});
}
function updateCars(dt){
  const maxC=Math.min(6,Math.floor([...G.flat()].filter(x=>x==='road').length/2));
  for(let i=cars.length-1;i>=0;i--){const car=cars[i];car.prog+=car.spd*dt;if(car.prog>=1){car.r=car.nr;car.c=car.nc;car.prog=0;const nb=roadNbrs(car.r,car.c);if(!nb.length){cars.splice(i,1);continue;}[car.nr,car.nc]=nb[Math.floor(Math.random()*nb.length)];}}
  while(cars.length<maxC)spawnCar();while(cars.length>maxC)cars.pop();
}
function drawCars(){
  for(const car of cars){
    const sp=tScr(car.c,car.r),tp=tScr(car.nc,car.nr);
    const cx2=sp.x+TW/2+(tp.x+TW/2-sp.x-TW/2)*car.prog,cy2=sp.y+TH/2+(tp.y+TH/2-sp.y-TH/2)*car.prog;
    ctx.save();ctx.translate(cx2,cy2);ctx.rotate(Math.atan2(tp.y-sp.y,tp.x-sp.x));
    ctx.fillStyle=car.col;ctx.fillRect(-S(8),-S(4),S(16),S(8));
    ctx.fillStyle=ltn(car.col,-35);ctx.fillRect(-S(4),-S(6.5),S(8),S(4.5));
    ctx.fillStyle='rgba(160,225,255,0.85)';ctx.fillRect(-S(3),-S(6),S(6),S(3.5));
    ctx.fillStyle='#1A1A1A';[[-S(5),S(3.5)],[S(5),S(3.5)]].forEach(([wx,wy])=>{ctx.beginPath();ctx.arc(wx,wy,S(2.5),0,Math.PI*2);ctx.fill();});
    ctx.restore();
  }
}
function spawnConfetti(){for(let i=0;i<100;i++){conf.push({x:canW/2+((Math.random()-0.5)*canW*0.35),y:canH*0.38,vx:(Math.random()-0.5)*15,vy:-Math.random()*13-4,r:Math.random()*4+2,rot:Math.random()*Math.PI*2,vr:(Math.random()-0.5)*0.38,col:CCOLS[Math.floor(Math.random()*CCOLS.length)],life:1,shape:Math.random()<0.5?'r':'c'});}}
function updateConf(dt){for(let i=conf.length-1;i>=0;i--){const p=conf[i];p.x+=p.vx*dt*60;p.y+=p.vy*dt*60;p.vy+=0.38;p.rot+=p.vr;p.life-=dt*0.5;if(p.life<=0||p.y>canH+20)conf.splice(i,1);}}
function drawConf(){cfx.clearRect(0,0,canW,canH);for(const p of conf){cfx.save();cfx.translate(p.x,p.y);cfx.rotate(p.rot);cfx.globalAlpha=Math.max(0,p.life);cfx.fillStyle=p.col;if(p.shape==='r'){cfx.fillRect(-p.r,-p.r/2,p.r*2,p.r);}else{cfx.beginPath();cfx.arc(0,0,p.r,0,Math.PI*2);cfx.fill();}cfx.restore();}}
function playPop(){try{const ac=new(window.AudioContext||window.webkitAudioContext)(),o=ac.createOscillator(),g=ac.createGain();o.connect(g);g.connect(ac.destination);o.type='sine';o.frequency.value=440+Math.random()*300;g.gain.setValueAtTime(0.2,ac.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.1);o.start();o.stop(ac.currentTime+0.12);}catch(e){}}

function render(ts){
  if(!ready){requestAnimationFrame(render);return;}
  const t=ts/1000,dt=Math.min(t-lastT,0.05);lastT=t;
  const dayP=(t/80)%1,na=nightAmt(dayP),night=na>0.4;
  document.getElementById('sky-time').textContent=skyIcon(dayP);
  updateCars(dt);updateConf(dt);
  ctx.fillStyle=skyColor(dayP);ctx.fillRect(0,0,canW,canH);
  if(na>0.05){for(const s of STARS){const al=na*(0.35+Math.sin(t*1.3+s.twink)*0.35);ctx.fillStyle=`rgba(255,255,255,${al.toFixed(2)})`;ctx.beginPath();ctx.arc(s.x*canW,s.y*canH,s.s,0,Math.PI*2);ctx.fill();}}
  for(let s=0;s<ROWS+COLS-1;s++){for(let row=0;row<=s;row++){const col=s-row;if(row>=ROWS||col>=COLS||col<0)continue;const{x,y}=tScr(col,row);if(x+TW<-10||x>canW+10||y+TH+TD<-10||y>canH+80)continue;const tile=G[row][col];if(tile){const td=TYPES.find(x=>x.id===tile);drawBase(x,y,td.c);deco(x,y,tile,t,night);}else drawEmpty(x,y);if(hov&&hov.col===col&&hov.row===row&&!panMode){ctx.beginPath();ctx.moveTo(x+TW/2,y);ctx.lineTo(x+TW,y+TH/2);ctx.lineTo(x+TW/2,y+TH);ctx.lineTo(x,y+TH/2);ctx.closePath();ctx.fillStyle=erasing?'rgba(255,55,55,0.22)':'rgba(255,255,255,0.22)';ctx.fill();}}}
  if(na>0.3){ctx.fillStyle=`rgba(0,10,40,${(na*0.28).toFixed(2)})`;ctx.fillRect(0,0,canW,canH);}
  drawCars();drawConf();
  requestAnimationFrame(render);
}
function rpos(e){const r=cv.getBoundingClientRect(),pt=e.touches?e.touches[0]:e;return{x:(pt.clientX-r.left)*(canW/r.width),y:(pt.clientY-r.top)*(canH/r.height)};}
function doPaint(e){const p=rpos(e),cell=sToG(p.x,p.y);if(!cell)return;if(erasing){if(G[cell.row][cell.col]){G[cell.row][cell.col]=null;playPop();}}else if(G[cell.row][cell.col]!==sel){if(firstPlace){firstPlace=false;spawnConfetti();}G[cell.row][cell.col]=sel;playPop();}}
function startPan(p){panning=true;panSX=p.x;panSY=p.y;camSX=camX;camSY=camY;}
function movePan(p){if(panning){camX=camSX+(p.x-panSX);camY=camSY+(p.y-panSY);}}

cv.addEventListener('mousedown',e=>{const p=rpos(e);if(panMode){startPan(p);cv.style.cursor='grabbing';}else{painting=true;doPaint(e);}});
cv.addEventListener('mousemove',e=>{const p=rpos(e);movePan(p);hov=sToG(p.x,p.y);if(painting&&!panMode)doPaint(e);});
cv.addEventListener('mouseup',()=>{painting=false;panning=false;cv.style.cursor=panMode?'grab':'crosshair';});
cv.addEventListener('mouseleave',()=>{hov=null;painting=false;panning=false;});
cv.addEventListener('contextmenu',e=>{e.preventDefault();startPan(rpos(e));});
let tpx=0,tpy=0;
cv.addEventListener('touchstart',e=>{e.preventDefault();if(e.touches.length>=2){painting=false;panning=true;const r=cv.getBoundingClientRect();tpx=((e.touches[0].clientX+e.touches[1].clientX)/2-r.left)*(canW/r.width);tpy=((e.touches[0].clientY+e.touches[1].clientY)/2-r.top)*(canH/r.height);camSX=camX;camSY=camY;}else if(panMode){startPan(rpos(e));}else{painting=true;doPaint(e);}},{passive:false});
cv.addEventListener('touchmove',e=>{e.preventDefault();if(e.touches.length>=2){const r=cv.getBoundingClientRect(),mx=((e.touches[0].clientX+e.touches[1].clientX)/2-r.left)*(canW/r.width),my=((e.touches[0].clientY+e.touches[1].clientY)/2-r.top)*(canH/r.height);camX=camSX+(mx-tpx);camY=camSY+(my-tpy);}else if(panning)movePan(rpos(e));else if(painting)doPaint(e);},{passive:false});
cv.addEventListener('touchend',e=>{if(e.touches.length===0){painting=false;panning=false;}});

let curCat2='nature';

  const ctEl=document.getElementById('ct'),tsEl=document.getElementById('ts');
  ctEl.innerHTML='';
  CATS.forEach(cat=>{const b=document.createElement('button');b.className='ctab'+(cat.id===curCat2?' on':'');b.textContent=cat.lbl;b.addEventListener('click',()=>{curCat2=cat.id;buildUI();});ctEl.appendChild(b);});
  tsEl.innerHTML='';
  TYPES.filter(t=>t.cat===curCat2).forEach(t=>{const d=document.createElement('div');d.className='tp'+(t.id===sel?' on':'');d.style.background=t.id===sel?'#FFF8E0':t.c[0]+'28';d.innerHTML=`<span class="te">${t.em}</span><span class="tl">${t.n}</span>`;d.addEventListener('click',()=>{sel=t.id;erasing=false;panMode=false;pb.classList.remove('pan');erb.classList.remove('era');cv.style.cursor='crosshair';buildUI();});tsEl.appendChild(d);});
}
buildUI();
requestAnimationFrame(render);
})();
</script>
